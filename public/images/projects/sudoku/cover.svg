<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#070c07"/>
  <!-- Scanlines -->
  <pattern id="scan" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
    <rect width="2" height="2" fill="rgba(0,0,0,0.12)"/>
  </pattern>
  <rect width="640" height="360" fill="url(#scan)"/>

  <!-- Sudoku grid centered -->
  <g transform="translate(195, 30)">
    <!-- 9x9 grid cells, each 32x32 -->
    <!-- Fill a few cells with numbers for preview -->
    <rect x="0" y="0" width="288" height="288" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>

    <!-- Thin grid lines -->
    <line x1="32" y1="0" x2="32" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="64" y1="0" x2="64" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="96" y1="0" x2="96" y2="288" stroke="#2d622d" stroke-width="1.5"/>
    <line x1="128" y1="0" x2="128" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="288" stroke="#2d622d" stroke-width="1.5"/>
    <line x1="224" y1="0" x2="224" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="288" stroke="#1a3a1a" stroke-width="0.5"/>

    <line x1="0" y1="32" x2="288" y2="32" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="0" y1="64" x2="288" y2="64" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="288" y2="96" stroke="#2d622d" stroke-width="1.5"/>
    <line x1="0" y1="128" x2="288" y2="128" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="288" y2="160" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="288" y2="192" stroke="#2d622d" stroke-width="1.5"/>
    <line x1="0" y1="224" x2="288" y2="224" stroke="#1a3a1a" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="288" y2="256" stroke="#1a3a1a" stroke-width="0.5"/>

    <!-- Outer border -->
    <rect x="0" y="0" width="288" height="288" fill="none" stroke="#1a8c0a" stroke-width="2"/>

    <!-- Selected cell highlight -->
    <rect x="64" y="64" width="32" height="32" fill="rgba(57,255,20,0.15)" stroke="#39ff14" stroke-width="1.5"/>

    <!-- Peer cells highlight -->
    <rect x="0" y="64" width="32" height="32" fill="rgba(57,255,20,0.05)"/>
    <rect x="32" y="64" width="32" height="32" fill="rgba(57,255,20,0.05)"/>
    <rect x="96" y="64" width="192" height="32" fill="rgba(57,255,20,0.04)"/>
    <rect x="64" y="0" width="32" height="64" fill="rgba(57,255,20,0.04)"/>
    <rect x="64" y="96" width="32" height="192" fill="rgba(57,255,20,0.04)"/>

    <!-- Some given numbers -->
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>
    <g font-family="monospace" font-size="18" text-anchor="middle" dominant-baseline="central" fill="#39ff14" filter="url(#glow)">
      <text x="16" y="16">5</text>
      <text x="48" y="16">3</text>
      <text x="112" y="16">7</text>
      <text x="16" y="48">6</text>
      <text x="112" y="48">1</text>
      <text x="144" y="48">9</text>
      <text x="176" y="48">5</text>
      <text x="16" y="112">8</text>
      <text x="80" y="112">6</text>
      <text x="256" y="112">3</text>
      <text x="16" y="144">4</text>
      <text x="80" y="144">8</text>
      <text x="272" y="144">1</text>
      <text x="16" y="176">7</text>
      <text x="80" y="176">9</text>
      <text x="256" y="176">6</text>
      <text x="80" y="208">6</text>
      <text x="224" y="208">2</text>
      <text x="80" y="240">4</text>
      <text x="128" y="240">1</text>
      <text x="160" y="240">9</text>
      <text x="80" y="272">8</text>
      <text x="192" y="272">7</text>
      <text x="272" y="272">9</text>
    </g>
  </g>

  <!-- Title -->
  <text x="320" y="338" font-family="monospace" font-size="13" text-anchor="middle" fill="#1a8c0a" letter-spacing="4">SUDOKU</text>
</svg>
