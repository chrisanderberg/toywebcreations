<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect width="48" height="48" fill="#0C1220" rx="4"/>

  <!-- Peg stems (centers at x=12, 24, 36) -->
  <rect x="11" y="6"  width="2" height="32" rx="1" fill="#2563EB"/>
  <rect x="23" y="6"  width="2" height="32" rx="1" fill="#2563EB"/>
  <rect x="35" y="6"  width="2" height="32" rx="1" fill="#2563EB"/>

  <!-- Peg bases -->
  <rect x="6"  y="38" width="12" height="3" rx="1" fill="#2563EB"/>
  <rect x="18" y="38" width="12" height="3" rx="1" fill="#2563EB"/>
  <rect x="30" y="38" width="12" height="3" rx="1" fill="#2563EB"/>

  <!--
    4 discs stacked on peg A (x=12):
    disc 4 (bottom, largest): w=16, x=4,  y=34
    disc 3:                   w=12, x=6,  y=28
    disc 2:                   w=8,  x=8,  y=22
    disc 1 (top, smallest):   w=4,  x=10, y=16
  -->
  <rect x="4"  y="34" width="16" height="4" rx="1" fill="#1E3A5F" stroke="#2563EB" stroke-width="0.75"/>
  <rect x="6"  y="28" width="12" height="4" rx="1" fill="#3B0E8A" stroke="#6830C8" stroke-width="0.75"/>
  <rect x="8"  y="22" width="8"  height="4" rx="1" fill="#4C18A0" stroke="#93C5FD" stroke-width="0.75"/>
  <rect x="10" y="16" width="4"  height="4" rx="1" fill="#60A5FA" stroke="#60A5FA" stroke-width="0.75"/>
</svg>
