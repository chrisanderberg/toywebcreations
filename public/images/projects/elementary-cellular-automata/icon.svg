<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" fill="#0C1220" rx="4"/>
  <!-- Rule 90 SierpiDski triangle  9 cells wide, 7 rows, cell size 5px -->
  <!-- Cells at (row, col): 0:{4}, 1:{3,5}, 2:{2,6}, 3:{1,3,5,7}, 4:{0,8}, 5:{1,7}, 6:{0,2,6,8} -->
  <!-- x = 2 + col*5, y = 6 + row*5, size = 4 -->
  <g fill="#3B82F6">
    <!-- Row 0 -->
    <rect x="22" y="6" width="4" height="4"/>
    <!-- Row 1 -->
    <rect x="17" y="11" width="4" height="4"/>
    <rect x="27" y="11" width="4" height="4"/>
    <!-- Row 2 -->
    <rect x="12" y="16" width="4" height="4"/>
    <rect x="32" y="16" width="4" height="4"/>
    <!-- Row 3 -->
    <rect x="7" y="21" width="4" height="4"/>
    <rect x="17" y="21" width="4" height="4"/>
    <rect x="27" y="21" width="4" height="4"/>
    <rect x="37" y="21" width="4" height="4"/>
    <!-- Row 4 -->
    <rect x="2" y="26" width="4" height="4"/>
    <rect x="42" y="26" width="4" height="4"/>
    <!-- Row 5 -->
    <rect x="7" y="31" width="4" height="4"/>
    <rect x="37" y="31" width="4" height="4"/>
    <!-- Row 6 -->
    <rect x="2" y="36" width="4" height="4"/>
    <rect x="12" y="36" width="4" height="4"/>
    <rect x="32" y="36" width="4" height="4"/>
    <rect x="42" y="36" width="4" height="4"/>
  </g>
</svg>
